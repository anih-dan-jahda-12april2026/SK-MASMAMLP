<!DOCTYPE html>
<html>
<head>
<title>Surat Keterangan</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 30px;
}
.folder {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin: 10px 0;
  cursor: pointer;
  font-weight: bold;
}
.content {
  display: none;
  padding-left: 20px;
}
a {
  display: block;
  margin: 5px 0;
}

  .file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
  margin-top: 10px;
}

.file-card {
  background: #fafafa;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  border: 1px solid #ddd;
  cursor: pointer;
  transition: 0.2s;
}

  .file-card:hover {
  background: #e8f0fe;
}

.file-icon {
  font-size: 30px;
}
  
</style>
</head>

<body>

<h2>📄 Arsip Surat Keterangan</h2>

<div id="container"></div>

<script>
let data = [
  {
    tahun: 2026,
    semester: {
      GANJIL: [
        {nama: "SK Aktif", link: "https://drive.google.com/file/d/1waTkD5GEfpANSD8sy7z45BDNkuwwmyA_/view?usp=sharing"},
        {nama: "SK Domisili", link: "LINK_FILE_2"}
      ],
      GENAP: [
        {nama: "SK Lulus", link: "LINK_FILE_3"}
      ]
    }
  }
];

let container = document.getElementById("container");

data.forEach(d => {

  let folder = document.createElement("div");
  folder.className = "folder";
  folder.innerHTML = "📁 SK " + d.tahun;

  let semesterBox = document.createElement("div");
  semesterBox.className = "content";

  for(let sm in d.semester){

    let smFolder = document.createElement("div");
    smFolder.className = "folder";
    smFolder.innerHTML = "📂 " + sm;

    let fileBox = document.createElement("div");
    fileBox.className = "content";

    let grid = document.createElement("div");
grid.className = "file-grid";

d.semester[sm].forEach(f => {
  let card = document.createElement("div");
  card.className = "file-card";

  card.innerHTML = `
    <div class="file-icon">📄</div>
    <div>${f.nama}</div>
  `;

  card.onclick = () => {
    window.open(f.link, "_blank");
  };

  grid.appendChild(card);
});

fileBox.appendChild(grid);

    smFolder.onclick = () => {
      fileBox.style.display =
        fileBox.style.display === "block" ? "none" : "block";
    };

    semesterBox.appendChild(smFolder);
    semesterBox.appendChild(fileBox);
  }

  folder.onclick = () => {
    semesterBox.style.display =
      semesterBox.style.display === "block" ? "none" : "block";
  };

  container.appendChild(folder);
  container.appendChild(semesterBox);
});
</script>

</body>
</html>
