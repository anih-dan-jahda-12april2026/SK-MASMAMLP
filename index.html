<!DOCTYPE html>
<html>
<head>
<title>Login SK</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
}

.box {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  text-align: center;
  color: white;
  width: 300px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: gold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 Akses Surat Keterangan</h2>

  <input type="text" id="user" placeholder="text"><br>
  <input type="password" id="pass" placeholder="Password"><br>

  <button onclick="login()">Masuk</button>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  // GANTI USER & PASSWORD DI SINI
  if(u === "MASMAMLP" && p === "Lembaga12345"){
    window.location.href = "sk.html";
  } else {
    alert("Username / Password salah!");
  }
}
</script>

</body>
</html>
